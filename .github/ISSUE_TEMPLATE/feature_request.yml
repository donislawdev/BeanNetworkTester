name: Feature request
description: Suggest an improvement or a new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The situation or workflow that is awkward today.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed solution
      description: What you would like the tool to do.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This fits a Windows network-conditions testing tool, not a general traffic shaper or a cross-platform rewrite.
          required: true
